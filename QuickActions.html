<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; padding: 16px; }
    h1 { color: #00d4ff; font-size: 20px; margin-bottom: 8px; }
    p.desc { color: #8899aa; font-size: 13px; margin-bottom: 20px; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .action-btn {
      background: #16213e; border: 1px solid #00d4ff33; border-radius: 8px; padding: 18px 12px;
      color: #e0e0e0; font-size: 13px; cursor: pointer; text-align: center; transition: all 0.2s;
    }
    .action-btn:hover { background: #1a2a4e; border-color: #00d4ff; }
    .action-btn .icon { font-size: 24px; display: block; margin-bottom: 6px; }
    .close-btn {
      display: block; width: 100%; padding: 10px; background: #16213e; color: #00d4ff;
      border: 1px solid #00d4ff; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .close-btn:hover { background: #00d4ff; color: #1a1a2e; }
  </style>
</head>
<body>
  <h1>Quick Actions</h1>
  <p class="desc">Common tasks at your fingertips. Launch actions directly from the sidebar.</p>
  <div class="btn-grid">
    <button class="action-btn" onclick="runAction('sync')"><span class="icon">&#x1f504;</span>Sync Data</button>
    <button class="action-btn" onclick="runAction('analyze')"><span class="icon">&#x1f4ca;</span>Analyze</button>
    <button class="action-btn" onclick="runAction('alerts')"><span class="icon">&#x1f514;</span>Alerts</button>
    <button class="action-btn" onclick="runAction('export')"><span class="icon">&#x1f4e5;</span>Export</button>
  </div>
  <button class="close-btn" onclick="google.script.host.close()">Close</button>
  <script>
    function runAction(action) {
      google.script.run.withSuccessHandler(function() {
        alert(action + ' completed.');
      }).runQuickAction(action);
    }
  </script>
</body>
</html>
