<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; padding: 16px; }
    h2 { color: #00d4ff; margin-bottom: 8px; }
    p.desc { color: #aaa; font-size: 13px; margin-bottom: 20px; }
    .actions { display: flex; flex-direction: column; gap: 10px; }
    .action-btn {
      background: #16213e; border: 1px solid #00d4ff33; border-radius: 8px;
      color: #e0e0e0; padding: 14px 16px; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; gap: 10px; transition: background 0.2s;
    }
    .action-btn:hover { background: #1a2a4e; border-color: #00d4ff; }
    .action-btn .icon { font-size: 20px; }
    .close-btn {
      margin-top: 24px; width: 100%; padding: 10px; background: #00d4ff;
      color: #1a1a2e; border: none; border-radius: 6px; font-size: 14px;
      font-weight: 600; cursor: pointer;
    }
    .close-btn:hover { background: #00b8d9; }
  </style>
</head>
<body>
  <h2>Quick Actions</h2>
  <p class="desc">Common tasks at your fingertips. Launch sync, analysis, alerts, or export with one click.</p>
  <div class="actions">
    <button class="action-btn" onclick="runAction('sync')"><span class="icon">&#x1F504;</span> Sync Inventory</button>
    <button class="action-btn" onclick="runAction('analyze')"><span class="icon">&#x1F4CA;</span> Analyze Deals</button>
    <button class="action-btn" onclick="runAction('alerts')"><span class="icon">&#x1F514;</span> Check Alerts</button>
    <button class="action-btn" onclick="runAction('export')"><span class="icon">&#x1F4E5;</span> Export Data</button>
  </div>
  <button class="close-btn" onclick="google.script.host.close()">Close</button>
  <script>
    function runAction(action) {
      google.script.run.withSuccessHandler(function() {
        alert(action.charAt(0).toUpperCase() + action.slice(1) + ' started.');
      }).withFailureHandler(function(e) {
        alert('Error: ' + e.message);
      }).handleQuickAction(action);
    }
  </script>
</body>
</html>
