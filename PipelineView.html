<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; }
    h1 { color: #00d4ff; font-size: 20px; margin-bottom: 8px; }
    p.desc { color: #8899aa; font-size: 13px; margin-bottom: 20px; }
    .pipeline { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 16px; }
    .stage {
      min-width: 180px; background: #16213e; border-radius: 8px; padding: 12px;
      border: 1px solid #00d4ff22; flex-shrink: 0;
    }
    .stage-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .stage-name { color: #00d4ff; font-size: 13px; font-weight: 600; }
    .stage-count { background: #00d4ff22; color: #00d4ff; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .deal-card {
      background: #1a1a2e; border-radius: 6px; padding: 10px; margin-bottom: 8px;
      border: 1px solid #ffffff0a; font-size: 12px;
    }
    .deal-card .name { font-weight: 600; margin-bottom: 4px; }
    .deal-card .amount { color: #00d4ff; }
    .summary { display: flex; gap: 10px; margin-bottom: 16px; }
    .summary-card {
      flex: 1; background: #16213e; border-radius: 8px; padding: 12px; text-align: center;
      border: 1px solid #00d4ff22;
    }
    .summary-card .val { color: #00d4ff; font-size: 20px; font-weight: 700; }
    .summary-card .lbl { color: #8899aa; font-size: 11px; margin-top: 4px; }
    .close-btn {
      display: block; width: 100%; padding: 10px; background: #16213e; color: #00d4ff;
      border: 1px solid #00d4ff; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .close-btn:hover { background: #00d4ff; color: #1a1a2e; }
  </style>
</head>
<body>
  <h1>Sales Pipeline</h1>
  <p class="desc">Visual overview of all deals across each stage of your sales process.</p>

  <div class="summary">
    <div class="summary-card"><div class="val">24</div><div class="lbl">Active Deals</div></div>
    <div class="summary-card"><div class="val">$186K</div><div class="lbl">Pipeline Value</div></div>
    <div class="summary-card"><div class="val">68%</div><div class="lbl">Win Rate</div></div>
  </div>

  <div class="pipeline">
    <div class="stage">
      <div class="stage-header"><span class="stage-name">New Lead</span><span class="stage-count">8</span></div>
      <div class="deal-card"><div class="name">Loading...</div><div class="amount">--</div></div>
    </div>
    <div class="stage">
      <div class="stage-header"><span class="stage-name">Contacted</span><span class="stage-count">6</span></div>
      <div class="deal-card"><div class="name">Loading...</div><div class="amount">--</div></div>
    </div>
    <div class="stage">
      <div class="stage-header"><span class="stage-name">Negotiation</span><span class="stage-count">5</span></div>
      <div class="deal-card"><div class="name">Loading...</div><div class="amount">--</div></div>
    </div>
    <div class="stage">
      <div class="stage-header"><span class="stage-name">Closed Won</span><span class="stage-count">5</span></div>
      <div class="deal-card"><div class="name">Loading...</div><div class="amount">--</div></div>
    </div>
  </div>

  <button class="close-btn" onclick="google.script.host.close()">Close</button>
</body>
</html>
