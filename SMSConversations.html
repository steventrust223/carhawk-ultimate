<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
    h1 { color: #00d4ff; text-align: center; margin-bottom: 20px; font-size: 22px; }
    .section { background: #16213e; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
    .section h2 { font-size: 16px; color: #00d4ff; margin-bottom: 10px; }
    .info { text-align: center; padding: 40px; color: #888; }
    .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; background: #00d4ff; color: #000; font-weight: bold; }
  </style>
</head>
<body>
  <h1>SMS Conversations</h1>
  <div class="section">
    <h2>Recent Conversations</h2>
    <div class="info">No SMS conversations yet. Export deals to SMS-iT to start messaging leads.</div>
  </div>
  <div style="text-align:center; margin-top:15px;">
    <button class="btn" onclick="google.script.host.close()">Close</button>
  </div>
</body>
</html>
