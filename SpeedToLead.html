<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; }
    h1 { color: #00d4ff; font-size: 20px; margin-bottom: 8px; }
    p.desc { color: #8899aa; font-size: 13px; margin-bottom: 20px; }
    .card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 12px; border: 1px solid #00d4ff22; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; }
    .stat-label { color: #8899aa; font-size: 12px; }
    .stat-value { color: #00d4ff; font-size: 24px; font-weight: 700; }
    .stat-unit { color: #8899aa; font-size: 12px; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .metric-card { background: #16213e; border-radius: 8px; padding: 14px; text-align: center; border: 1px solid #00d4ff22; }
    .metric-card .val { color: #00d4ff; font-size: 22px; font-weight: 700; }
    .metric-card .lbl { color: #8899aa; font-size: 11px; margin-top: 4px; }
    .lead-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ffffff0a; }
    .lead-item:last-child { border-bottom: none; }
    .lead-name { font-size: 13px; }
    .lead-time { color: #00d4ff; font-size: 12px; }
    .close-btn {
      display: block; width: 100%; padding: 10px; background: #16213e; color: #00d4ff;
      border: 1px solid #00d4ff; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 16px;
    }
    .close-btn:hover { background: #00d4ff; color: #1a1a2e; }
  </style>
</head>
<body>
  <h1>Speed to Lead</h1>
  <p class="desc">Monitor response times and ensure new leads are contacted quickly to maximize conversion rates.</p>

  <div class="metrics">
    <div class="metric-card"><div class="val">2.4m</div><div class="lbl">Avg Response</div></div>
    <div class="metric-card"><div class="val">94%</div><div class="lbl">Under 5 min</div></div>
    <div class="metric-card"><div class="val">12</div><div class="lbl">Pending</div></div>
    <div class="metric-card"><div class="val">47</div><div class="lbl">Today</div></div>
  </div>

  <div class="card">
    <h3 style="color:#00d4ff;font-size:14px;margin-bottom:10px;">Recent Leads</h3>
    <div class="lead-item"><span class="lead-name">Loading leads...</span><span class="lead-time">--</span></div>
  </div>

  <button class="close-btn" onclick="google.script.host.close()">Close</button>

  <script>
    google.script.run.withSuccessHandler(function(data) {
      if (data && data.leads) {
        // Populate lead list
      }
    }).getSpeedToLeadData();
  </script>
</body>
</html>
