<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; }
    h1 { color: #00d4ff; font-size: 20px; margin-bottom: 8px; }
    p.desc { color: #8899aa; font-size: 13px; margin-bottom: 20px; }
    .card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 12px; border: 1px solid #00d4ff22; }
    label { display: block; color: #8899aa; font-size: 12px; margin-bottom: 4px; }
    input {
      width: 100%; padding: 8px 10px; background: #1a1a2e; border: 1px solid #00d4ff33;
      border-radius: 6px; color: #e0e0e0; font-size: 13px; margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #00d4ff; }
    .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffffff0a; }
    .result-row:last-child { border-bottom: none; }
    .result-label { color: #8899aa; font-size: 13px; }
    .result-value { font-weight: 600; font-size: 13px; }
    .profit { color: #00ff88; }
    .loss { color: #ff4466; }
    .btn-row { display: flex; gap: 10px; margin-top: 16px; }
    .primary-btn {
      flex: 1; padding: 10px; background: #00d4ff; color: #1a1a2e; border: none;
      border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .primary-btn:hover { background: #00b8d9; }
    .close-btn {
      flex: 1; padding: 10px; background: #16213e; color: #00d4ff;
      border: 1px solid #00d4ff; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    .close-btn:hover { background: #00d4ff; color: #1a1a2e; }
  </style>
</head>
<body>
  <h1>Deal Calculator</h1>
  <p class="desc">Calculate potential profit on a deal including purchase price, repairs, fees, and expected sale price.</p>

  <div class="card">
    <label>Purchase Price ($)</label>
    <input type="number" id="purchasePrice" placeholder="0.00" oninput="calculate()">
    <label>Repair / Reconditioning ($)</label>
    <input type="number" id="repairCost" placeholder="0.00" oninput="calculate()">
    <label>Transport / Fees ($)</label>
    <input type="number" id="fees" placeholder="0.00" oninput="calculate()">
    <label>Expected Sale Price ($)</label>
    <input type="number" id="salePrice" placeholder="0.00" oninput="calculate()">
  </div>

  <div class="card" id="results">
    <h3 style="color:#00d4ff;font-size:14px;margin-bottom:10px;">Profit Breakdown</h3>
    <div class="result-row"><span class="result-label">Total Investment</span><span class="result-value" id="totalInvest">$0</span></div>
    <div class="result-row"><span class="result-label">Gross Profit</span><span class="result-value" id="grossProfit">$0</span></div>
    <div class="result-row"><span class="result-label">ROI</span><span class="result-value" id="roi">0%</span></div>
  </div>

  <div class="btn-row">
    <button class="primary-btn" onclick="calculate()">Calculate</button>
    <button class="close-btn" onclick="google.script.host.close()">Close</button>
  </div>

  <script>
    function calculate() {
      var purchase = parseFloat(document.getElementById('purchasePrice').value) || 0;
      var repair = parseFloat(document.getElementById('repairCost').value) || 0;
      var fees = parseFloat(document.getElementById('fees').value) || 0;
      var sale = parseFloat(document.getElementById('salePrice').value) || 0;
      var totalInvest = purchase + repair + fees;
      var profit = sale - totalInvest;
      var roi = totalInvest > 0 ? ((profit / totalInvest) * 100).toFixed(1) : 0;
      document.getElementById('totalInvest').textContent = '$' + totalInvest.toLocaleString();
      var profitEl = document.getElementById('grossProfit');
      profitEl.textContent = '$' + profit.toLocaleString();
      profitEl.className = 'result-value ' + (profit >= 0 ? 'profit' : 'loss');
      document.getElementById('roi').textContent = roi + '%';
    }
  </script>
</body>
</html>
